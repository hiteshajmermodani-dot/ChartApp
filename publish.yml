name: Publish NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack
        run: dotnet pack ChartAppLib/ChartAppLib.csproj -c Release --output .

      - name: Push
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.CHARTAPPLIB_API_KEY }} --source https://api.nuget.org/v3/index.json
