name: Build NuGet Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for versioning

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project (Release)
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Create NuGet package
      run: dotnet pack ChartApp/ChartApp.csproj --configuration Release --no-build --output ./nupkg

    - name: Upload NuGet package
      uses: actions/upload-artifact@v3
      with:
        name: nuget-package
        path: ./nupkg/

    - name: Publish to NuGet.org
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        dotnet nuget push ./nupkg/*.nupkg `
          -k ${{ secrets.NUGET_API_KEY }} `
          -s https://api.nuget.org/v3/index.json `
          --skip-duplicate
      env:
        DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: nuget-package
        path: ./nupkg/

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ChartApp ${{ github.ref_name }}
        body: |
          ## Release Notes
          See [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/main/RELEASE_NOTES.md) for detailed changelog.

          ## NuGet Package
          Install via NuGet Package Manager:
          ```
          Install-Package ChartAppLib -Version ${{ github.ref_name }}
          ```

          Or via dotnet CLI:
          ```
          dotnet add package ChartAppLib --version ${{ github.ref_name }}
          ```
        draft: false
        prerelease: false

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./nupkg/ChartAppLib.${{ github.ref_name }}.nupkg
        asset_name: ChartAppLib.${{ github.ref_name }}.nupkg
        asset_content_type: application/zip
